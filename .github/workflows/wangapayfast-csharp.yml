name: wangapayfast-csharp

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'wangapayfast-csharp/**'
      - '.github/workflows/wangapayfast-csharp.yml'
  push:
    branches: [main]
    paths:
      - 'wangapayfast-csharp/**'
      - '.github/workflows/wangapayfast-csharp.yml'
  workflow_dispatch:

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore wangapayfast-csharp/WangaPayFast.CSharp.csproj
          dotnet restore wangapayfast-csharp/tests/WangaPayFast.CSharp.Tests/WangaPayFast.CSharp.Tests.csproj
      - name: Check formatting
        run: dotnet format wangapayfast-csharp/WangaPayFast.CSharp.csproj --verify-no-changes --verbosity minimal
      - name: Job summary
        if: always()
        run: |
          echo "## Format" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: format
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore wangapayfast-csharp/WangaPayFast.CSharp.csproj
          dotnet restore wangapayfast-csharp/tests/WangaPayFast.CSharp.Tests/WangaPayFast.CSharp.Tests.csproj
      - name: Build
        run: dotnet build wangapayfast-csharp/WangaPayFast.CSharp.csproj -c Release --no-restore
      - name: Job summary
        if: always()
        run: |
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: |
          dotnet restore wangapayfast-csharp/WangaPayFast.CSharp.csproj
          dotnet restore wangapayfast-csharp/tests/WangaPayFast.CSharp.Tests/WangaPayFast.CSharp.Tests.csproj
      - name: Test
        run: dotnet test wangapayfast-csharp/tests/WangaPayFast.CSharp.Tests/WangaPayFast.CSharp.Tests.csproj -c Release --no-build
      - name: Job summary
        if: always()
        run: |
          echo "## Test" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
