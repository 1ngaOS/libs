name: wangamail-rs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'wangamail-rs/**'
      - '.github/workflows/wangamail-rs.yml'
  push:
    branches: [main]
    paths:
      - 'wangamail-rs/**'
      - '.github/workflows/wangamail-rs.yml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wangamail-rs/target/
          key: ${{ runner.os }}-cargo-format-${{ hashFiles('wangamail-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-format-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run format check
        working-directory: wangamail-rs
        run: cargo fmt --check

      - name: Job summary
        if: always()
        run: |
          echo "## Format" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: format
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wangamail-rs/target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('wangamail-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy

      - name: Run clippy
        working-directory: wangamail-rs
        run: cargo clippy -- -D warnings

      - name: Job summary
        if: always()
        run: |
          echo "## Lint" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wangamail-rs/target/
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('wangamail-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run cargo check
        working-directory: wangamail-rs
        run: cargo check

      - name: Job summary
        if: always()
        run: |
          echo "## Check" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wangamail-rs/target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('wangamail-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Run tests
        working-directory: wangamail-rs
        run: cargo test

      - name: Job summary
        if: always()
        run: |
          echo "## Test" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version
        id: current
        working-directory: wangamail-rs
        run: |
          V=$(grep '^version = ' Cargo.toml | sed -n 's/.*"\([^"]*\)".*/\1/p')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Current version: $V"

      - name: Bump patch version
        id: bump
        working-directory: wangamail-rs
        run: |
          V="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$V"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW" >> $GITHUB_OUTPUT
          sed -i "s/^version = \".*\"/version = \"$NEW\"/" Cargo.toml
          echo "New version: $NEW"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push version
        run: |
          git add wangamail-rs/Cargo.toml
          if git diff --staged --quiet; then
            echo "No version change to commit"
          else
            git commit -m "chore(wangamail-rs): bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
            git push origin main
          fi

      - name: Job summary
        if: always()
        run: |
          echo "## Bump Version" >> $GITHUB_STEP_SUMMARY
          echo "**New version:** ${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: version-bump
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (version bump)
        run: git pull origin main || true

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            wangamail-rs/target/
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('wangamail-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build release
        working-directory: wangamail-rs
        run: cargo build --release

      - name: Job summary
        if: always()
        run: |
          echo "## Build" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    needs: [version-bump, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin main || true

      - name: Get version
        id: version
        working-directory: wangamail-rs
        run: |
          V=$(grep '^version = ' Cargo.toml | sed -n 's/.*"\([^"]*\)".*/\1/p')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Version: $V"

      - name: Job summary
        if: always()
        run: |
          echo "## Get Version" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: get-version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin main || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Publish to crates.io
        working-directory: wangamail-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

      - name: Job summary
        if: always()
        run: |
          echo "## Publish" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [get-version, publish]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag and release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wangamail-rs-v${{ needs.get-version.outputs.version }}
          name: wangamail-rs v${{ needs.get-version.outputs.version }}
          body: |
            ## wangamail-rs ${{ needs.get-version.outputs.version }}
            Send email via Microsoft Graph API using app registration (client credentials).
            - [crates.io](https://crates.io/crates/wangamail-rs)
            - [Documentation](https://docs.rs/wangamail-rs/${{ needs.get-version.outputs.version }})
          draft: false
          prerelease: false

      - name: Job summary
        if: always()
        run: |
          echo "## Release" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** wangamail-rs-v${{ needs.get-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
